name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest ruff pytest-timeout

      - name: Lint with ruff (errors only)
        run: |
          ruff check . --select E9,F63,F7,F82

      - name: Run core and storage tests
        run: |
          python -m pytest tests/test_core.py tests/test_storage.py -v --tb=short

      - name: Run network tests
        run: |
          python -m pytest tests/test_network.py -v --tb=short --timeout=60
